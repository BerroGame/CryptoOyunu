<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otoyol Macerası: Dikkatli Ol!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        body {
            background-color: #0d0f14;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Telefon Ekranı Simülatörü Kontrolü */
        .game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #11141c;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1e293b;
            border-right: 1px solid #1e293b;
            position: relative;
        }

        /* Üst Bar / Göstergeler */
        .hud-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #161b26;
            border-bottom: 2px solid #1e293b;
        }

        .hud-item {
            text-align: center;
        }

        .hud-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .hud-value {
            font-size: 16px;
            font-weight: bold;
            color: #00ffcc;
        }

        /* Akan Yol Animasyonu (CSS Efekti) */
        .road-viewport {
            height: 25vh;
            background: #1f2430;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .road-lines {
            position: absolute;
            width: 10px;
            height: 100%;
            background: linear-gradient(to bottom, #fff 50%, transparent 50%);
            background-size: 10px 40px;
            animation: moveRoad 0.5s linear infinite;
        }

        @keyframes moveRoad {
            0% { background-position-y: 0; }
            100% { background-position-y: 40px; }
        }

        .car-sprite {
            width: 60px;
            height: 40px;
            background: #ff3366;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 0 15px #ff3366;
            z-index: 2;
            margin-bottom: 10px;
        }

        /* Hikaye ve Metin Alanı */
        .story-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            gap: 15px;
            overflow-y: auto;
        }

        .story-text {
            font-size: 16px;
            line-height: 1.5;
            color: #f1f5f9;
        }

        .warning-text {
            font-weight: bold;
            color: #ffcc00;
            font-size: 14px;
            background: rgba(255, 204, 0, 0.1);
            padding: 8px;
            border-radius: 6px;
            display: none;
        }

        /* Alt Butonlar Alanı - Mobil Dostu */
        .action-section {
            padding: 20px;
            background: #161b26;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #1e293b;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: #1e293b;
            color: #fff;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-choice {
            background: #00ffcc;
            color: #0b0e14;
        }

        .btn-danger {
            background: #ff3366;
            color: white;
        }

        /* Gizli Input Alanı */
        .input-box {
            display: none;
            width: 100%;
            padding: 12px;
            background: #0d0f14;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="game-container">
        <!-- HUD Göstergeler -->
        <div class="hud-bar">
            <div class="hud-item">
                <div class="hud-label">Konum</div>
                <div class="hud-value" id="hud-km">0 KM</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">Araba Sağlığı</div>
                <div class="hud-value" id="hud-hp">100%</div>
            </div>
        </div>

        <!-- Yol Görseli -->
        <div class="road-viewport">
            <div class="road-lines" id="road-anim"></div>
            <div class="car-sprite"></div>
        </div>

        <!-- Hikaye Alanı -->
        <div class="story-section">
            <div class="warning-text" id="warning-box">DİKKAT!</div>
            <p class="story-text" id="story-text">Gece yarısı ıssız bir otoyolda ilerliyorsun. Radyodan cızırtılı sesler geliyor. Birden yol kenarında parlayan neon ceketli bir otostopçu görüyorsun. Ne yapacaksın?</p>
        </div>

        <!-- Giriş Kutusu (Şifre vb için) -->
        <div style="padding: 0 20px;">
            <input type="number" class="input-box" id="game-input" placeholder="Sayıyı girin...">
        </div>

        <!-- Aksiyon Butonları -->
        <div class="action-section" id="action-area">
            <button class="btn btn-choice" onclick="nextStep(1)">Yavaşla ve Adamı Arabaya Al</button>
            <button class="btn" onclick="nextStep(2)">Gaza Bas, Görmezden Gel</button>
        </div>
    </div>
</div>

<script>
    let currentStage = "start";
    let memoryNumber = 0;
    let kediKuralı = ""; // "bas" veya "basma"
    let playerHp = 100;
    let km = 0;
    let clickCount = 0;

    function updateHud(newKm, hpDamage = 0) {
        km += newKm;
        playerHp = Math.max(0, playerHp - hpDamage);
        document.getElementById('hud-km').innerText = km + " KM";
        document.getElementById('hud-hp').innerText = playerHp + "%";
        
        if(playerHp <= 0) {
            gameOver("Araban ağır hasar aldı ve yolda kaldın! Elendin.");
        }
    }

    function gameOver(reason) {
        document.getElementById('road-anim').style.animation = "none";
        document.getElementById('warning-box').style.display = "none";
        document.getElementById('game-input').style.display = "none";
        document.getElementById('story-text').innerText = reason;
        document.getElementById('action-area').innerHTML = `<button class="btn btn-danger" onclick="resetGame()">YENİDEN BAŞLA</button>`;
    }

    function resetGame() {
        location.reload();
    }

    function nextStep(choice) {
        const textEl = document.getElementById('story-text');
        const actionEl = document.getElementById('action-area');
        const warnEl = document.getElementById('warning-box');
        const inputEl = document.getElementById('game-input');

        // GİZLİ SAYI HAFIZASI ETABI
        if (currentStage === "start") {
            if (choice === 1) {
                memoryNumber = Math.floor(100 + Math.random() * 900); // Rastgele 3 basamaklı sayı
                updateHud(15, 0);
                textEl.innerText = `Adam arabaya bindi. Garip gözlükleri var. Sana bakıp fısıldıyor: "İlerideki kontrol noktasında polisler beni arıyor. Onlara '${memoryNumber}' sayısını söylemelisin. Bu arada yolda KEDİ görürsen sakın ekrandaki butona BASMA!"`;
                actionEl.innerHTML = `<button class="btn btn-choice" onclick="nextStage('etap2')">Devam Et</button>`;
            } else {
                updateHud(20, 10);
                textEl.innerText = `Gaza bastın ama adam arkandan öyle bir lanet okudu ki arabanın motoru arıza yaptı (%10 Hasar). Yolda ilerlerken aniden karşına büyük bir tabela çıktı. Üzerinde kocaman kırmızı harflerle '${memoryNumber = 404}' yazıyor. Bunu aklında tutsan iyi olur.`;
                actionEl.innerHTML = `<button class="btn btn-choice" onclick="nextStage('etap2_b')">Yola Devam Et</button>`;
            }
        }
        
        // POLİS BARİKATI ETABI
        else if (currentStage === "etap2" || currentStage === "etap2_b") {
            updateHud(30, 0);
            textEl.innerText = "KM 45: Karşına neon ışıklı bir Robot Polis barikatı çıktı. Lazer silahlarını arabana doğrulttular. Telsizden mekanik bir ses geliyor: 'GEÇİŞ ŞİFRESİNİ GİRİN!' (Az önce aklında tuttuğun sayıyı girmen gerekiyor!)";
            inputEl.style.display = "block";
            actionEl.innerHTML = `<button class="btn btn-choice" onclick="checkPassword()">Şifreyi Onayla</button>`;
        }

        // TERS PSİKOLOJİ / KEDİ ETABI
        else if (currentStage === "kedi_etabi") {
            // Bu etapta butona basma kuralları troller
            if (choice === "MİYAV") {
                clickCount++;
                warnEl.innerText = `BASTIN! (Şu anki basma sayısı: ${clickCount})`;
                if (clickCount === 3) {
                    // Oyuncu 3 kere bastı. Ama kural basmamaktı!
                    gameOver("TUZAK! Otostopçu adam sana 'Kedi görünce sakın BASMA' demişti. Sen ise gaza gelip 3 kere bastın ve araba patladı!");
                }
            } else if (choice === "BEKLE") {
                // Oyuncu basmadan beklemeyi seçti (Doğru hamle)
                updateHud(40, 0);
                warnEl.style.display = "none";
                textEl.innerText = "Harika! Kediyi görünce frene basmadın ve sakin kaldın. Tuzaktan kurtuldun. Otoyolun sonuna ulaştın ve büyük şehir ışıkları göründü. Oyunu BAŞARIYLA BİTİRDİN! Gerçek bir hafıza ustasısın.";
                actionEl.innerHTML = `<button class="btn btn-choice" style="background:#00ff88;" onclick="resetGame()">KUTLA VE TEKRAR OYNA</button>`;
            }
        }
    }

    function nextStage(stageName) {
        currentStage = stageName;
        nextStep();
    }

    function checkPassword() {
        const inputEl = document.getElementById('game-input');
        const textEl = document.getElementById('story-text');
        const actionEl = document.getElementById('action-area');
        const warnEl = document.getElementById('warning-box');

        if (parseInt(inputEl.value) === memoryNumber) {
            inputEl.style.display = "none";
            currentStage = "kedi_etabi";
            updateHud(20, 0);
            warnEl.style.display = "block";
            warnEl.innerText = "GÖRSEL BİLDİRİM: YOLDA BİR KARA KEDİ BELİRDİ!";
            textEl.innerText = "Polisler şifreyi onayladı ve barikatı açtı! Tam rahatladım derken ekranda aniden bir KEDİ belirdi ve sistem bağırıyor: 'HIZLICA ALTTTAKİ BUTONA 3 KERE BAS!'... Bir dakika, otostopçunun uyarısını hatırlıyor musun?";
            
            actionEl.innerHTML = `
                <button class="btn btn-danger" onclick="nextStep('MİYAV')">3 KERE BAS</button>
                <button class="btn" onclick="nextStep('BEKLE')">HİÇBİR ŞEYE BASMA, BEKLE</button>
            `;
        } else {
            updateHud(0, 40);
            alert("YANLIŞ SAYI! Polisler arabana ateş açtı! %40 Hasar!");
        }
    }
</script>

</body>
</html>
