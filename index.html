<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #startBtn { 
            width: 100vw; height: 100vh; 
            font-size: 50px; cursor: pointer; 
            background: #000; color: #fff; border: none;
        }
        .troll-video {
            position: fixed; width: 48%; height: 48%; z-index: 999;
            display: none; object-fit: cover;
        }
    </style>
</head>
<body>

    <button id="startBtn">BAŞLAT</button>

    <!-- Devasa videolar (Ekranın 4 köşesini kaplar) -->
    <video id="v1" class="troll-video" style="top:0; left:0;" src="VİDEO_LİNKİNİ_BURAYA_KOY" loop playsinline></video>
    <video id="v2" class="troll-video" style="top:0; right:0;" src="VİDEO_LİNKİNİ_BURAYA_KOY" loop playsinline></video>
    <video id="v3" class="troll-video" style="bottom:0; left:0;" src="VİDEO_LİNKİNİ_BURAYA_KOY" loop playsinline></video>
    <video id="v4" class="troll-video" style="bottom:0; right:0;" src="VİDEO_LİNKİNİ_BURAYA_KOY" loop playsinline></video>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            document.documentElement.requestFullscreen();
            this.style.display = 'none'; // Butonu yok et

            let videos = document.querySelectorAll('.troll-video');
            videos.forEach(v => {
                v.style.display = 'block';
                v.play();
            });

            setTimeout(() => {
                location.reload(); // 30 saniye sonra her şeyi sıfırla
            }, 30000);
        });
    </script>
</body>
</html>
