<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Booster Pro</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }
        #ui { margin-top: 30vh; }
        #startBtn { 
            padding: 20px 40px; 
            font-size: 24px; 
            cursor: pointer; 
            background: #0f0; 
            border: none; 
            border-radius: 10px;
        }
        .troll-video {
            position: fixed; 
            width: 150px; 
            height: 150px; 
            z-index: 99999;
            display: none; 
            border: 4px solid red;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>RAM Booster Pro</h1>
        <p>Cihazı hızlandırmak için başlatın.</p>
        <button id="startBtn">BAŞLAT</button>
    </div>

    <!-- Videoları buraya doğrudan ekledim -->
    <video id="v1" class="troll-video" style="top:10px; left:10px;" src="troll.mp4" loop playsinline></video>
    <video id="v2" class="troll-video" style="top:10px; right:10px;" src="troll.mp4" loop playsinline></video>
    <video id="v3" class="troll-video" style="bottom:10px; left:10px;" src="troll.mp4" loop playsinline></video>
    <video id="v4" class="troll-video" style="bottom:10px; right:10px;" src="troll.mp4" loop playsinline></video>

    <script>
        const btn = document.getElementById('startBtn');
        const ui = document.getElementById('ui');
        const videos = document.querySelectorAll('.troll-video');

        btn.addEventListener('click', function() {
            // Tam ekran isteği
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            
            ui.innerHTML = "<h1>TEMİZLENİYOR...</h1><p>Lütfen bekleyin, işlem sırasında cihazı kullanmayın.</p>";
            
            videos.forEach(v => {
                v.style.display = 'block';
                v.play();
            });

            // 30 saniye sonra her şeyi kapat
            setTimeout(() => {
                videos.forEach(v => { 
                    v.pause(); 
                    v.style.display = 'none'; 
                });
                
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
                
                ui.innerHTML = "<h1>İşlem Başarılı!</h1><p>Cihazınız hızlandırıldı.</p>";
                alert("RAM Temizleme Tamamlandı!");
            }, 30000);
        });
    </script>
</body>
</html>
